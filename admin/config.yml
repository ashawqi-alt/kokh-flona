backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"
locale: "ar"

collections:
  - name: "products"
    label: "المنتجات"
    folder: "products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "الرمز (مثال K1)", name: "slug", widget: "string" }
      - { label: "اسم البيت", name: "title", widget: "string" }
      - { label: "السعر (ريال)", name: "price", widget: "number" }
      - { label: "الطول سم", name: "length", widget: "number" }
      - { label: "العرض سم", name: "width", widget: "number" }
      - { label: "الارتفاع سم", name: "height", widget: "number" }
      - { label: "الصورة", name: "image", widget: "image" }